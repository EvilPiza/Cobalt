name: detekt

on:
  pull_request:

jobs:
  detekt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run detekt
        run: ./gradlew detekt
