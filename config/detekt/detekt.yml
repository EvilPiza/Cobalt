build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: true

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

style:
  MagicNumber:
    active: true
    ignoreNumbers: [-1, 0, 1, 2]
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true

  WildcardImport:
    active: true

  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false

  ReturnCount:
    active: true
    max: 1
    excludedFunctions:
      - equals

  ThrowsCount:
    active: true
    max: 1

  NewLineAtEndOfFile:
    active: true

  TrailingWhitespace:
    active: true

  ForbiddenComment:
    active: true
    comments:
      - "TODO:"
      - "FIXME:"
      - "STOPSHIP:"

  UnusedImports:
    active: true

complexity:
  LongMethod:
    active: true
    threshold: 20

  ComplexMethod:
    active: true
    threshold: 5

  NestedBlockDepth:
    active: true
    threshold: 2

  LongParameterList:
    active: true
    functionThreshold: 4
    constructorThreshold: 4

  LargeClass:
    active: true
    threshold: 300

  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInFiles: 20

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

  UnreachableCode:
    active: true

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  ImplicitUnitReturnType:
    active: false

performance:
  SpreadOperator:
    active: true

naming:
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'

  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'

  VariableNaming:
    active: true
    variablePattern: '[a-z][a-zA-Z0-9]*'

  ConstantNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][a-z0-9]*)*'

comments:
  CommentOverPrivateFunction:
    active: true

  CommentOverPrivateProperty:
    active: true
